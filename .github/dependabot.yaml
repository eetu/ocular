version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5
    groups:
      svelte:
        patterns: ["svelte*", "@sveltejs/*"]

  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
