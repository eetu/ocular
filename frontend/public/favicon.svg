<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"
     fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- ocular glyph: an eye. Opaque white tile so it doubles as the raster source
       for the home-screen / apple-touch icons (iOS fills transparency black) and
       matches the family's light-tile icons. Dark theme-text stroke; the one
       hardcoded brand color is the warm accent pupil (#f78f08), the family's
       "warm centre". The iris is clipped to the eye so it tucks under the upper
       lid, with a gap left above the lower lid. -->
  <defs>
    <clipPath id="eye"><path d="M4 32 Q32 11 60 32 Q32 53 4 32 Z"/></clipPath>
  </defs>
  <rect width="64" height="64" fill="#ffffff"/>
  <g clip-path="url(#eye)">
    <circle cx="32" cy="29" r="12" stroke="#525252" stroke-width="2.5"/>
    <circle cx="32" cy="30" r="5" fill="#f78f08" stroke="none"/>
  </g>
  <path d="M4 32 Q32 11 60 32 Q32 53 4 32 Z" stroke="#525252" stroke-width="3"/>
</svg>
