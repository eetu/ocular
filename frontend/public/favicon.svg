<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"
     fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- ocular glyph: an eye. currentColor outline inherits theme text color; the
       only hardcoded color is the warm accent pupil (#f78f08), the family's
       "warm centre". -->
