<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"
     fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Maskable variant: same eye glyph shrunk to the ~60% centre safe zone so
       Android's adaptive mask can't clip it. Opaque white bg fills the canvas. -->
  <rect width="64" height="64" fill="#ffffff"/>
  <g transform="translate(32 32) scale(0.6) translate(-32 -32)">
    <defs>
      <clipPath id="eyem"><path d="M4 32 Q32 11 60 32 Q32 53 4 32 Z"/></clipPath>
    </defs>
    <g clip-path="url(#eyem)">
      <circle cx="32" cy="29" r="12" stroke="#525252" stroke-width="2.5"/>
      <circle cx="32" cy="30" r="5" fill="#f78f08" stroke="none"/>
    </g>
    <path d="M4 32 Q32 11 60 32 Q32 53 4 32 Z" stroke="#525252" stroke-width="3"/>
  </g>
</svg>
